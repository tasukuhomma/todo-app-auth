<!DOCTYPE html>
<html>
<head>
  <title>Todo App Auth</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <h1>My Todo App</h1>

  <div>
    <h2>ログイン</h2>
    <button onclick="login()">Googleでログイン</button>
  </div>

  <p id="userInfo"></p>

  <div>
    <h2>タスク</h2>
    <input id="taskInput" placeholder="タスクを入力">
    <button onclick="addTask()">追加</button>
  </div>

  <ul id="taskList"></ul>

</div>
<script type="module" src="script.js"></script>
</body>
</html>
<script>
  alert("HTMLは動いてる");
</script>
